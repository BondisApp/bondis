<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0F1E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BONDIS — Colectivos en tiempo real</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  /* ── RESET & TOKENS ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0A0F1E;
    --surface:    #111827;
    --surface2:   #1a2235;
    --border:     rgba(255,255,255,0.08);
    --accent:     #FFD60A;
    --accent2:    #FF6B35;
    --text:       #F0F4FF;
    --text-muted: #6B7A99;
    --green:      #22C55E;
    --red:        #EF4444;
    --blue:       #3B82F6;
    --sheet-min:  72px;
    --sheet-mid:  52vh;
    --sheet-max:  92vh;
    --header-h:   52px;
    --radius:     16px;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body:    'Barlow', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ROOT ── */
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    position: relative;
    z-index: 400;
    height: var(--header-h);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  #logo {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
    line-height: 1;
    flex-shrink: 0;
  }
  #logo span { color: var(--text); }

  /* STATUS DOT */
  #status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  #status-dot.disconnected {
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
  }
  #status-dot.connecting {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse-dot 1s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity:1; } 50% { opacity:0.3; }
  }

  #vehicle-count {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  #vehicle-count strong {
    color: var(--accent);
    font-size: 15px;
  }

  /* HEADER ACTIONS */
  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .icon-btn:active { background: var(--surface2); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* ACTIVE FILTER CHIP in header */
  #active-filter-chip {
    display: none;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: var(--bg);
    border-radius: 20px;
    padding: 4px 10px 4px 12px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    animation: chip-in 0.2s ease;
  }
  @keyframes chip-in {
    from { opacity:0; transform: scale(0.8); }
    to   { opacity:1; transform: scale(1); }
  }
  #active-filter-chip.visible { display: flex; }
  #active-filter-chip .chip-x {
    width: 18px; height: 18px;
    background: rgba(0,0,0,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── MAP ── */
  #map {
    flex: 1;
    position: relative;
    z-index: 1;
    background: #0d1526;
  }

  /* Leaflet dark overrides */
  .leaflet-container { background: #0d1526 !important; }
  .leaflet-tile { filter: brightness(0.85) saturate(0.7) hue-rotate(185deg); }

  /* ── FLOATING MAP BUTTONS ── */
  #map-fab-group {
    position: absolute;
    bottom: calc(var(--sheet-min) + 20px);
    right: 16px;
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: bottom 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .fab {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: background 0.15s, transform 0.1s;
    backdrop-filter: blur(8px);
  }
  .fab:active { transform: scale(0.93); }
  .fab svg { width: 22px; height: 22px; }
  .fab.accent { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* ── BOTTOM SHEET ── */
  #bottom-sheet {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 200;
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    border-top: 1px solid var(--border);
    box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    touch-action: none;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    /* default: collapsed */
    transform: translateY(calc(100% - var(--sheet-min)));
    will-change: transform;
  }
  #bottom-sheet.mid  { transform: translateY(calc(100% - var(--sheet-mid))); }
  #bottom-sheet.open { transform: translateY(calc(100% - var(--sheet-max))); }
  #bottom-sheet.no-transition { transition: none !important; }

  /* DRAG HANDLE */
  #sheet-handle {
    height: var(--sheet-min);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: grab;
    user-select: none;
    padding: 0 16px;
  }
  #sheet-handle:active { cursor: grabbing; }
  .drag-pill {
    width: 40px;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    flex-shrink: 0;
  }
  #sheet-handle-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #sheet-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    flex: 1;
  }

  /* SHEET CONTENT */
  #sheet-content {
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 0 16px calc(16px + var(--safe-bottom));
    height: calc(var(--sheet-max) - var(--sheet-min));
    overscroll-behavior: contain;
  }

  /* ── SEARCH BAR ── */
  #search-container {
    position: relative;
    margin-bottom: 16px;
  }
  #search-wrap {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0 12px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  #search-wrap:focus-within { border-color: var(--accent); }
  #search-wrap svg { width: 18px; height: 18px; color: var(--text-muted); flex-shrink: 0; }
  #search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    height: 48px;
    caret-color: var(--accent);
  }
  #search-input::placeholder { color: var(--text-muted); }
  #search-clear {
    display: none;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
  }
  #search-clear.visible { display: flex; }

  /* SUGGESTIONS */
  #suggestions {
    display: none;
    margin-top: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    gap: 8px;
    padding-bottom: 4px;
  }
  #suggestions::-webkit-scrollbar { display: none; }
  #suggestions.visible { display: flex; }
  .suggestion-chip {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 14px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    min-height: 36px;
    display: flex;
    align-items: center;
  }
  .suggestion-chip:active,
  .suggestion-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  /* ── SECTIONS ── */
  .section-label {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 20px 0 10px;
  }

  /* ── NEARBY STOPS ── */
  #nearby-section { margin-top: 4px; }

  .stop-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .stop-card:active { border-color: var(--accent); }
  .stop-card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }
  .stop-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: rgba(255,214,10,0.12);
    border: 1px solid rgba(255,214,10,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .stop-icon svg { width: 16px; height: 16px; color: var(--accent); }
  .stop-name {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .stop-dist {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    flex-shrink: 0;
  }

  /* ETA ROWS */
  .eta-list { display: flex; flex-direction: column; gap: 6px; }
  .eta-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .line-badge {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 800;
    background: var(--accent);
    color: var(--bg);
    border-radius: 6px;
    padding: 2px 8px;
    min-width: 40px;
    text-align: center;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }
  .line-badge.secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .eta-value {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }
  .eta-value.soon { color: var(--green); }
  .eta-value.arriving { color: var(--accent2); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .eta-direction {
    font-size: 11px;
    color: var(--text-muted);
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── STATS ROW ── */
  #stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 4px;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 2px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── LEGEND MODAL ── */
  #legend-modal {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 500;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    align-items: flex-end;
    padding: 16px;
  }
  #legend-modal.visible { display: flex; }
  #legend-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    animation: slide-up 0.25s ease;
  }
  @keyframes slide-up {
    from { transform: translateY(20px); opacity:0; }
    to   { transform: translateY(0);    opacity:1; }
  }
  .legend-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }
  .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 10px; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }
  .legend-dot.gps    { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .legend-dot.api    { background: var(--blue);  box-shadow: 0 0 6px var(--blue); }
  .legend-dot.no-signal { background: var(--text-muted); }
  .legend-dot.stop   { background: var(--accent); }
  .legend-text { font-size: 14px; color: var(--text); }
  .legend-sub  { font-size: 11px; color: var(--text-muted); }
  #legend-close {
    width: 100%;
    height: 44px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-family: var(--font-body);
    cursor: pointer;
  }

  /* ── VEHICLE MARKERS ── */
  .bus-marker {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 800;
    border: 2px solid rgba(255,255,255,0.9);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    cursor: pointer;
    color: white;
    letter-spacing: 0.2px;
    transition: transform 0.2s;
  }
  .bus-marker:hover { transform: scale(1.15); z-index: 9999 !important; }
  .bus-marker.gps-source   { background: #16a34a; border-color: #4ade80; }
  .bus-marker.api-source   { background: #1d4ed8; border-color: #60a5fa; }
  .bus-marker.stale-source { background: #4b5563; border-color: #9ca3af; }

  .stop-marker {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid rgba(255,255,255,0.8);
    cursor: pointer;
  }

  /* POPUP */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: 12px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    color: var(--text) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    padding: 14px 16px !important;
    min-width: 180px;
  }
  .leaflet-popup-tip-container { display: none; }
  .popup-line {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .popup-route {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .popup-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .popup-badge {
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    color: var(--text-muted);
  }
  .popup-badge.gps   { color: var(--green); border-color: rgba(34,197,94,0.4); }
  .popup-badge.speed { color: var(--blue);  border-color: rgba(59,130,246,0.4); }

  /* ── LOADING OVERLAY ── */
  #loading {
    position: absolute;
    inset: 0;
    z-index: 600;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading-logo {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1px;
  }
  #loading-logo span { color: var(--text); }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-msg {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  /* ── TOAST ── */
  #toast {
    position: absolute;
    top: calc(var(--header-h) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    z-index: 700;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 18px;
    font-size: 14px;
    color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── DESKTOP ── */
  @media (min-width: 768px) {
    #bottom-sheet {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 360px;
      border-radius: 0;
      border-right: 1px solid var(--border);
      border-top: none;
      transform: none !important;
    }
    #sheet-handle { display: none; }
    #sheet-content {
      height: calc(100% - 0px);
      padding-top: 16px;
    }
    #map-fab-group {
      right: 16px;
      bottom: 20px;
    }
    #map { margin-left: 360px; }
    #active-filter-chip { display: none !important; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div id="logo">BOND<span>IS</span></div>
    <div id="status-dot" class="connecting" title="Conectando..."></div>
    <div id="vehicle-count"><strong id="vc-num">—</strong> vehículos</div>
    <div class="header-actions">
      <div id="active-filter-chip" class="chip" title="Limpiar filtro" onclick="clearFilter()">
        <span id="filter-chip-label">—</span>
        <div class="chip-x">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </div>
      </div>
    </div>
  </header>

  <!-- MAP -->
  <div id="map"></div>

  <!-- FLOATING BUTTONS -->
  <div id="map-fab-group">
    <div class="fab accent" id="fab-locate" onclick="locateUser()" title="Mi ubicación">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    </div>
    <div class="fab" onclick="showLegend()" title="Leyenda">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
    </div>
  </div>

  <!-- BOTTOM SHEET -->
  <div id="bottom-sheet">
    <div id="sheet-handle">
      <div class="drag-pill"></div>
      <div id="sheet-handle-row">
        <span id="sheet-title">Buscá tu línea</span>
      </div>
    </div>

    <div id="sheet-content">

      <!-- STATS -->
      <div id="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-vehicles">—</div>
          <div class="stat-label">Vehículos</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-lines">—</div>
          <div class="stat-label">Líneas</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-nearby">—</div>
          <div class="stat-label">Cercanos</div>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="section-label">LÍNEA</div>
      <div id="search-container">
        <div id="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search-input" type="text" inputmode="search" placeholder="Ej: 98, 15, 132..." autocomplete="off" spellcheck="false">
          <button id="search-clear" class="icon-btn" onclick="clearSearch()" style="width:28px;height:28px;background:none;border:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div id="suggestions"></div>
      </div>

      <!-- NEARBY STOPS -->
      <div id="nearby-section">
        <div class="section-label">PARADAS CERCANAS</div>
        <div id="nearby-list">
          <div style="text-align:center;padding:20px 0;color:var(--text-muted);font-size:14px;">
            Activá tu ubicación para ver paradas cercanas
          </div>
        </div>
      </div>

    </div><!-- /sheet-content -->
  </div><!-- /bottom-sheet -->

  <!-- LEGEND MODAL -->
  <div id="legend-modal" onclick="hideLegend(event)">
    <div id="legend-box">
      <div class="legend-title">¿Qué significa cada color?</div>
      <div class="legend-grid">
        <div class="legend-item">
          <div class="legend-dot gps"></div>
          <div>
            <div class="legend-text">GPS directo</div>
            <div class="legend-sub">Posición exacta</div>
          </div>
        </div>
        <div class="legend-item">
          <div class="legend-dot api"></div>
          <div>
            <div class="legend-text">API GCBA</div>
            <div class="legend-sub">~30s de delay</div>
          </div>
        </div>
        <div class="legend-item">
          <div class="legend-dot no-signal"></div>
          <div>
            <div class="legend-text">Sin señal</div>
            <div class="legend-sub">Última posición</div>
          </div>
        </div>
        <div class="legend-item">
          <div class="legend-dot stop"></div>
          <div>
            <div class="legend-text">Parada</div>
            <div class="legend-sub">Toca para ETA</div>
          </div>
        </div>
      </div>
      <button id="legend-close" onclick="hideLegend()">Cerrar</button>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loading">
    <div id="loading-logo">BOND<span>IS</span></div>
    <div class="spinner"></div>
    <div id="loading-msg">Conectando al servidor...</div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

</div><!-- /app -->

<script>
// ═══════════════════════════════════════════════════════
// BONDIS MVP v12 — Mobile-First
// ═══════════════════════════════════════════════════════

const SERVER_URL = 'wss://bondis-production.up.railway.app';
const HTTP_URL   = 'https://bondis-production.up.railway.app';

// ── STATE ──────────────────────────────────────────────
const state = {
  ws: null,
  vehicles: new Map(),        // vehicleId → {lat,lng,line,routeName,source,...}
  markers: new Map(),         // vehicleId → Leaflet marker
  stops: [],                  // nearby stops [{id,name,lat,lng,dist,lines:[]}]
  userLat: null,
  userLng: null,
  activeFilter: null,         // line number string or null
  searchQuery: '',
  allLines: new Set(),
  connected: false,
  mapReady: false,
};

// ── MAP INIT ───────────────────────────────────────────
const map = L.map('map', {
  center: [-34.6037, -58.3816],
  zoom: 13,
  zoomControl: false,
  attributionControl: false,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
}).addTo(map);

// Custom zoom control (top-right, away from sheet)
L.control.zoom({ position: 'topright' }).addTo(map);

// ── WEBSOCKET ──────────────────────────────────────────
function connect() {
  setStatusDot('connecting');
  setLoadingMsg('Conectando al servidor...');

  try {
    state.ws = new WebSocket(SERVER_URL);
  } catch(e) {
    console.error('WS error:', e);
    setStatusDot('disconnected');
    setTimeout(connect, 5000);
    return;
  }

  state.ws.onopen = () => {
    console.log('✅ WS conectado');
    state.connected = true;
    setStatusDot('connected');
    hideLoading();
  };

  state.ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      handleMessage(data);
    } catch(e) {
      console.warn('Parse error:', e);
    }
  };

  state.ws.onclose = () => {
    console.warn('⚠️ WS desconectado, reconectando...');
    state.connected = false;
    setStatusDot('disconnected');
    showToast('Reconectando...');
    setTimeout(connect, 3000);
  };

  state.ws.onerror = (e) => {
    console.error('WS error:', e);
  };
}

function handleMessage(data) {
  // Soporte para múltiples formatos de mensaje
  if (Array.isArray(data)) {
    data.forEach(processVehicle);
  } else if (data.vehicles && Array.isArray(data.vehicles)) {
    data.vehicles.forEach(processVehicle);
  } else if (data.type === 'vehicle_update') {
    processVehicle(data);
  } else if (data.lat !== undefined || data.latitude !== undefined) {
    processVehicle(data);
  }
}

function processVehicle(v) {
  // Normalizar campos — el server puede usar distintos nombres
  const id      = v.id || v.vehicleId || v.vehicle_id;
  const lat     = parseFloat(v.lat || v.latitude  || 0);
  const lng     = parseFloat(v.lng || v.longitude || 0);

  // PRIORIDAD 1: publicNumber primero, luego fallbacks
  const lineNum = v.publicNumber
                || v.lineNumber
                || v.line
                || v.routeShortName
                || v.shortName
                || '?';

  const routeName = v.routeLongName || v.headsign || v.direction || '';
  const source    = v.source || (v.hasGps ? 'gps' : 'api');
  const speed     = v.speed || v.velocidad || 0;
  const bearing   = v.bearing || v.heading || 0;
  const timestamp = v.timestamp || Date.now();

  if (!id || !lat || !lng) return;
  if (Math.abs(lat) < 1 || Math.abs(lng) < 1) return;

  // Guardar en state
  state.vehicles.set(String(id), { id, lat, lng, lineNum, routeName, source, speed, bearing, timestamp });
  state.allLines.add(lineNum);

  // Renderizar o mover marker
  updateMarker(String(id), lat, lng, lineNum, routeName, source, speed);

  // Actualizar stats periódicamente
  scheduleStatsUpdate();
}

// ── MARKERS ───────────────────────────────────────────
function getBusColor(source) {
  if (source === 'gps')  return 'gps-source';
  if (source === 'stale') return 'stale-source';
  return 'api-source';
}

function updateMarker(id, lat, lng, lineNum, routeName, source, speed) {
  const shouldShow = !state.activeFilter || state.activeFilter === lineNum;

  if (state.markers.has(id)) {
    const marker = state.markers.get(id);
    marker.setLatLng([lat, lng]);
    // Visibility
    if (shouldShow) {
      marker.getElement() && (marker.getElement().style.display = '');
    } else {
      marker.getElement() && (marker.getElement().style.display = 'none');
    }
    return;
  }

  // Nuevo marker
  const el = document.createElement('div');
  el.className = `bus-marker ${getBusColor(source)}`;
  el.textContent = lineNum.length > 4 ? lineNum.slice(0,4) : lineNum;
  if (!shouldShow) el.style.display = 'none';

  const icon = L.divIcon({
    html: el.outerHTML,
    className: '',
    iconSize: [32, 32],
    iconAnchor: [16, 16],
  });

  const marker = L.marker([lat, lng], { icon })
    .addTo(map)
    .bindPopup(buildPopup(lineNum, routeName, source, speed), {
      maxWidth: 220,
      className: 'bondis-popup',
    });

  marker.on('click', () => {
    if (state.activeFilter === lineNum) {
      clearFilter();
    } else {
      applyFilter(lineNum);
    }
  });

  state.markers.set(id, marker);
}

function buildPopup(lineNum, routeName, source, speed) {
  const srcLabel = source === 'gps' ? 'GPS' : source === 'stale' ? 'Sin señal' : 'API GCBA';
  const srcClass = source === 'gps' ? 'gps' : '';
  const speedStr = speed > 0 ? `${Math.round(speed)} km/h` : '';
  return `
    <div class="popup-line">Línea ${lineNum}</div>
    <div class="popup-route">${routeName || 'Sin ramal'}</div>
    <div class="popup-badges">
      <span class="popup-badge ${srcClass}">${srcLabel}</span>
      ${speedStr ? `<span class="popup-badge speed">🚌 ${speedStr}</span>` : ''}
    </div>
  `;
}

// ── FILTER ────────────────────────────────────────────
function applyFilter(lineNum) {
  state.activeFilter = lineNum;
  document.getElementById('filter-chip-label').textContent = `Línea ${lineNum}`;
  document.getElementById('active-filter-chip').classList.add('visible');
  document.getElementById('search-input').value = lineNum;

  // Show/hide markers
  state.markers.forEach((marker, id) => {
    const v = state.vehicles.get(id);
    if (!v) return;
    const el = marker.getElement();
    if (el) el.style.display = (v.lineNum === lineNum) ? '' : 'none';
  });

  // Zoom to first matching vehicle
  const match = [...state.vehicles.values()].find(v => v.lineNum === lineNum);
  if (match) {
    map.flyTo([match.lat, match.lng], 14, { duration: 0.8 });
  }

  showToast(`Mostrando Línea ${lineNum}`);
  clearSuggestions();
}

function clearFilter() {
  state.activeFilter = null;
  document.getElementById('active-filter-chip').classList.remove('visible');
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');

  state.markers.forEach(marker => {
    const el = marker.getElement();
    if (el) el.style.display = '';
  });
  clearSuggestions();
}

// ── SEARCH ────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const suggestionsEl = document.getElementById('suggestions');
const searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toUpperCase();
  state.searchQuery = q;
  searchClear.classList.toggle('visible', q.length > 0);

  if (q.length === 0) {
    clearSuggestions();
    return;
  }

  // Filter lines
  const matches = [...state.allLines]
    .filter(l => String(l).toUpperCase().includes(q))
    .sort((a, b) => {
      // Exact match first, then numeric
      if (a === q) return -1;
      if (b === q) return 1;
      return parseInt(a)||0 - parseInt(b)||0;
    })
    .slice(0, 20);

  renderSuggestions(matches);
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const q = searchInput.value.trim();
    if (q) applyFilter(q.toUpperCase());
    searchInput.blur();
  }
});

// Focus → open sheet mid
searchInput.addEventListener('focus', () => {
  openSheet('mid');
});

function renderSuggestions(lines) {
  if (!lines.length) {
    clearSuggestions();
    return;
  }
  suggestionsEl.innerHTML = lines.map(l => `
    <div class="suggestion-chip ${state.activeFilter === l ? 'active' : ''}"
         onclick="applyFilter('${l}')">${l}</div>
  `).join('');
  suggestionsEl.classList.add('visible');
}

function clearSuggestions() {
  suggestionsEl.innerHTML = '';
  suggestionsEl.classList.remove('visible');
}

function clearSearch() {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  clearSuggestions();
  if (state.activeFilter) clearFilter();
}

// ── NEARBY STOPS ──────────────────────────────────────
let nearbyUpdateTimer = null;

function locateUser() {
  if (!navigator.geolocation) {
    showToast('Geolocalización no disponible');
    return;
  }
  showToast('Buscando tu ubicación...');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.userLat = pos.coords.latitude;
      state.userLng = pos.coords.longitude;

      // Marker del usuario
      if (state.userMarker) {
        state.userMarker.setLatLng([state.userLat, state.userLng]);
      } else {
        const userIcon = L.divIcon({
          html: `<div style="
            width:16px;height:16px;border-radius:50%;
            background:var(--accent2);
            border:3px solid white;
            box-shadow:0 0 10px rgba(255,107,53,0.8);
          "></div>`,
          className: '',
          iconSize: [16, 16],
          iconAnchor: [8, 8],
        });
        state.userMarker = L.marker([state.userLat, state.userLng], { icon: userIcon }).addTo(map);

        // Circle
        L.circle([state.userLat, state.userLng], {
          radius: 500,
          color: 'rgba(255,107,53,0.4)',
          fillColor: 'rgba(255,107,53,0.06)',
          fillOpacity: 1,
          weight: 1,
        }).addTo(map);
      }

      map.flyTo([state.userLat, state.userLng], 15, { duration: 1 });
      computeNearbyStops();
      openSheet('mid');
      showToast('Ubicación encontrada');
    },
    (err) => {
      console.warn('Geoloc error:', err);
      showToast('No se pudo obtener ubicación');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function computeNearbyStops() {
  if (!state.userLat) return;

  // Calcular vehículos cercanos a 500m
  const nearby = [];
  const RADIUS = 500; // metros

  state.vehicles.forEach(v => {
    const dist = haversine(state.userLat, state.userLng, v.lat, v.lng);
    if (dist <= RADIUS) {
      nearby.push({ ...v, distM: dist });
    }
  });

  nearby.sort((a, b) => a.distM - b.distM);

  // Agrupar por línea → simular "paradas"
  const byLine = {};
  nearby.forEach(v => {
    if (!byLine[v.lineNum]) byLine[v.lineNum] = [];
    byLine[v.lineNum].push(v);
  });

  renderNearbyStops(byLine);

  // Stat
  document.getElementById('stat-nearby').textContent = Object.keys(byLine).length;
}

function renderNearbyStops(byLine) {
  const listEl = document.getElementById('nearby-list');
  const lines = Object.keys(byLine);

  if (!lines.length) {
    listEl.innerHTML = `<div style="text-align:center;padding:20px 0;color:var(--text-muted);font-size:14px;">
      No hay colectivos en 500m ahora mismo
    </div>`;
    return;
  }

  listEl.innerHTML = lines.slice(0, 10).map(lineNum => {
    const vehicles = byLine[lineNum];
    const nearest = vehicles[0];
    const distStr = nearest.distM < 100
      ? 'Llegando!'
      : nearest.distM < 300
      ? `~${Math.round(nearest.distM)}m`
      : `${Math.round(nearest.distM)}m`;

    // Estimación de ETA muy simple: distancia / velocidad promedio
    // Si sabemos speed del vehículo, usarla; si no, asumir 18 km/h
    const vehicleSpeed = nearest.speed > 3 ? nearest.speed : 18;
    const etaMin = Math.round((nearest.distM / 1000) / (vehicleSpeed / 60));
    const etaStr = nearest.distM < 80
      ? '¡Ya llega!'
      : etaMin <= 1
      ? '1 min'
      : `${etaMin} min`;

    const etaClass = nearest.distM < 100 ? 'arriving' : etaMin <= 3 ? 'soon' : '';

    return `
      <div class="stop-card" onclick="applyFilter('${lineNum}')">
        <div class="stop-card-header">
          <div class="stop-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 3H8M12 3v4"/>
            </svg>
          </div>
          <div class="stop-name">Línea ${lineNum}</div>
          <div class="stop-dist">${distStr}</div>
        </div>
        <div class="eta-list">
          <div class="eta-row">
            <div class="line-badge">${lineNum}</div>
            <div class="eta-value ${etaClass}">${etaStr}</div>
            <div class="eta-direction">${nearest.routeName || ''}</div>
          </div>
          ${vehicles.length > 1 ? `
          <div class="eta-row">
            <div class="line-badge secondary">${lineNum}</div>
            <div class="eta-value" style="color:var(--text-muted)">
              ${estimateSecond(vehicles[1])} min
            </div>
            <div class="eta-direction">2do colectivo</div>
          </div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function estimateSecond(v) {
  if (!state.userLat) return '?';
  const dist = haversine(state.userLat, state.userLng, v.lat, v.lng);
  const speed = v.speed > 3 ? v.speed : 18;
  return Math.max(2, Math.round((dist / 1000) / (speed / 60)));
}

// ── UTILS ─────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI / 180;
  const φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

let statsTimer = null;
function scheduleStatsUpdate() {
  if (statsTimer) return;
  statsTimer = setTimeout(() => {
    statsTimer = null;
    const v = state.vehicles.size;
    const l = state.allLines.size;
    document.getElementById('stat-vehicles').textContent = v > 999 ? (v/1000).toFixed(1)+'k' : v;
    document.getElementById('stat-lines').textContent = l;
    document.getElementById('vc-num').textContent = v;
    // Re-calc nearby if we have location
    if (state.userLat) computeNearbyStops();
  }, 500);
}

// ── BOTTOM SHEET ──────────────────────────────────────
const sheet = document.getElementById('bottom-sheet');
let sheetState = 'collapsed'; // 'collapsed' | 'mid' | 'open'
let dragStartY = 0;
let dragStartTranslate = 0;
let isDragging = false;

function openSheet(level = 'mid') {
  sheet.classList.remove('mid', 'open', 'no-transition');
  if (level === 'mid')  sheet.classList.add('mid');
  if (level === 'open') sheet.classList.add('open');
  sheetState = level;
  updateFabPosition();
}

function collapseSheet() {
  sheet.classList.remove('mid', 'open');
  sheetState = 'collapsed';
  updateFabPosition();
}

function updateFabPosition() {
  const fab = document.getElementById('map-fab-group');
  // Mobile only
  if (window.innerWidth < 768) {
    const offsets = { collapsed: 72, mid: 40, open: 16 };
    const sheetH = sheetState === 'mid'
      ? window.innerHeight * 0.52
      : sheetState === 'open'
      ? window.innerHeight * 0.92
      : 72;
    fab.style.bottom = `${sheetH + 12}px`;
  }
}

// DRAG
const handle = document.getElementById('sheet-handle');

function onDragStart(e) {
  if (window.innerWidth >= 768) return;
  isDragging = true;
  dragStartY = e.touches ? e.touches[0].clientY : e.clientY;

  const transform = getComputedStyle(sheet).transform;
  const matrix = new DOMMatrix(transform);
  dragStartTranslate = matrix.m42;

  sheet.classList.add('no-transition');
  e.preventDefault();
}

function onDragMove(e) {
  if (!isDragging) return;
  const y = e.touches ? e.touches[0].clientY : e.clientY;
  const delta = y - dragStartY;
  const newTranslate = Math.max(
    window.innerHeight * (1 - 0.92),
    dragStartTranslate + delta
  );
  sheet.style.transform = `translateY(${newTranslate}px)`;
  e.preventDefault();
}

function onDragEnd(e) {
  if (!isDragging) return;
  isDragging = false;
  sheet.classList.remove('no-transition');
  sheet.style.transform = '';

  const y = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
  const delta = y - dragStartY;
  const velocity = delta; // simplified

  if (velocity < -40) {
    // Swipe up
    if (sheetState === 'collapsed') openSheet('mid');
    else if (sheetState === 'mid') openSheet('open');
  } else if (velocity > 40) {
    // Swipe down
    if (sheetState === 'open') openSheet('mid');
    else collapseSheet();
  } else {
    // Snap back
    openSheet(sheetState);
  }
  updateFabPosition();
}

handle.addEventListener('touchstart', onDragStart, { passive: false });
handle.addEventListener('touchmove', onDragMove, { passive: false });
handle.addEventListener('touchend', onDragEnd);
handle.addEventListener('mousedown', onDragStart);
document.addEventListener('mousemove', onDragMove);
document.addEventListener('mouseup', onDragEnd);

// Tap handle to toggle
handle.addEventListener('click', (e) => {
  if (Math.abs(dragStartY - (e.touches?.[0]?.clientY || e.clientY || dragStartY)) > 5) return;
  if (sheetState === 'collapsed') openSheet('mid');
  else if (sheetState === 'mid') openSheet('open');
  else collapseSheet();
  updateFabPosition();
});

// Close sheet when tapping map
map.on('click', () => {
  if (window.innerWidth < 768 && sheetState !== 'collapsed') {
    collapseSheet();
  }
});

// ── STATUS & UI ───────────────────────────────────────
function setStatusDot(status) {
  const dot = document.getElementById('status-dot');
  dot.className = '';
  if (status === 'disconnected') { dot.classList.add('disconnected'); dot.title = 'Desconectado'; }
  if (status === 'connecting')   { dot.classList.add('connecting');   dot.title = 'Conectando...'; }
  // 'connected' → sin clase extra, el CSS base ya es verde
  dot.title = status === 'connected' ? 'Conectado' : dot.title;
}

function hideLoading() {
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
    }, 600);
  }, 800);
}

function setLoadingMsg(msg) {
  document.getElementById('loading-msg').textContent = msg;
}

let toastTimer = null;
function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

function showLegend() {
  document.getElementById('legend-modal').classList.add('visible');
}
function hideLegend(e) {
  if (!e || e.target === document.getElementById('legend-modal') || e.currentTarget === document.getElementById('legend-close')) {
    document.getElementById('legend-modal').classList.remove('visible');
  }
}

// ── INIT ──────────────────────────────────────────────
function init() {
  // Prevent double-tap zoom on iOS
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - (document._lastTouch || 0) < 300) e.preventDefault();
    document._lastTouch = now;
  }, { passive: false });

  // Init sheet position
  updateFabPosition();

  // Resize listener
  window.addEventListener('resize', updateFabPosition);

  // Connect
  connect();

  // Auto-reconnect keepalive ping
  setInterval(() => {
    if (state.ws && state.ws.readyState === WebSocket.OPEN) {
      state.ws.send(JSON.stringify({ type: 'ping' }));
    }
  }, 30000);

  // Auto-refresh nearby stops every 15s
  setInterval(() => {
    if (state.userLat) computeNearbyStops();
  }, 15000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
